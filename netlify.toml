# Netlify Build-Konfiguration für KI-Schule
#
# Build-Befehl: Vite baut die SPA, danach installiert Playwright
# Chromium und rendert jede öffentliche Route vorab als statisches
# HTML (für Google, LLMs und Social-Crawler). Das Ergebnis liegt
# komplett in dist/ — jede Route hat eine eigene index.html mit
# vollem Content, Meta-Tags und JSON-LD.

[build]
  command = "npm run build && npx playwright install --with-deps chromium && node scripts/prerender.mjs"
  publish = "dist"

# Node 18+ für Vite 5 und React 18
[build.environment]
  NODE_VERSION = "18"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressiv (Vite hängt Content-Hashes an Dateinamen)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# llms.txt und llms-full.txt sollen immer frisch sein
[[headers]]
  for = "/llms*.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

# Sitemap und robots.txt
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
