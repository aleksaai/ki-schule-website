<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#66A4FF" />

    <!--
      Fallback-Title für den allerersten Paint, bevor react-helmet-async gemountet ist.
      ALLE anderen SEO-Meta-Tags (description, keywords, robots, author, canonical,
      og:*, twitter:*) werden ausschließlich von <SEO /> per Route gesetzt. Wir dürfen
      sie hier NICHT hardcoden, weil react-helmet-async Meta-Tags mit demselben
      name/property nicht ersetzt, sondern zusätzlich einfügt — das würde im Prerender
      zu Duplikaten und falschen Defaults auf allen Subseiten führen.
    -->
    <title>KI-Schule | Deutscher KI-Kurs & KI-Agentur gründen</title>

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- LLM-Crawler: maschinenlesbare Beschreibung der Website -->
    <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM Summary" />
    <link rel="alternate" type="text/plain" href="/llms-full.txt" title="LLM Full Description" />

    <!-- DNS / Preconnect für externe Assets -->
    <link rel="preconnect" href="https://cal.com" />
    <link rel="dns-prefetch" href="https://cal.com" />

    <!-- Site-wide JSON-LD (Organization + WebSite). Wird von Helmet auf / zusätzlich mit EducationalOrganization, Course, FAQ angereichert. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://ki-hochschule.de/#organization",
      "name": "KI-Schule",
      "legalName": "Spalevic Consulting Kft.",
      "url": "https://ki-hochschule.de/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://ki-hochschule.de/icon.png",
        "width": 512,
        "height": 512
      },
      "image": "https://ki-hochschule.de/og-image.png",
      "description": "KI-Schule ist die #1 deutschsprachige Community für Personen, die mit KI eine eigene Agentur aufbauen und online Geld verdienen wollen.",
      "foundingDate": "2024",
      "founder": {
        "@type": "Person",
        "name": "Aleksa Spalevic"
      },
      "email": "info@aleksa.ai",
      "telephone": "+49 160 7763741",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Lőcsei út 9/A",
        "postalCode": "1147",
        "addressLocality": "Budapest",
        "addressCountry": "HU"
      },
      "sameAs": [
        "https://www.instagram.com/iamaleksa.ai/",
        "https://www.linkedin.com/in/aleksaspalevic/",
        "https://www.youtube.com/@aleksa-ai"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://ki-hochschule.de/#website",
      "url": "https://ki-hochschule.de/",
      "name": "KI-Schule",
      "description": "Deutscher KI-Kurs, Coaching und Community für KI-Agenturen und KI-Automation.",
      "inLanguage": "de-DE",
      "publisher": { "@id": "https://ki-hochschule.de/#organization" }
    }
    </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
